name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8

      # A tag is a promise about a version number. PyPI only lets you make it
      # once, so check the two agree before anything is uploaded.
      - name: Check the tag matches the version in pyproject.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(uv version --short)"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} wants to publish ${tag}, but pyproject.toml says ${version}"
            exit 1
          fi
          echo "publishing ${version}"

      - run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tasky-tui
    permissions:
      id-token: write  # mints the OIDC token PyPI trusts instead of a password
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
